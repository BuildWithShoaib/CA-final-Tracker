<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CA Final — Performance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════ CA FINAL TRACKER — STUDY TRACKER UI ═══════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Light theme palette — Study Tracker style */
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --surface3: #e8edf5;
  --border: #e2e8f0;
  --border2: #cbd5e1;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --nav: #ffffff;
  --navBorder: #e2e8f0;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);

  /* Signal colors — adjusted for light theme */
  --os-red: #dc2626;
  --os-red-dim: rgba(220,38,38,0.10);
  --os-amber: #d97706;
  --os-amber-dim: rgba(217,119,6,0.10);
  --os-green: #16a34a;
  --os-green-dim: rgba(22,163,74,0.10);
  --os-blue: #2563eb;
  --os-blue-dim: rgba(37,99,235,0.10);
  --os-violet: #7c3aed;
  --os-violet-dim: rgba(124,58,237,0.10);
  --os-cyan: #0891b2;
  --os-cyan-dim: rgba(8,145,178,0.10);

  /* Subject colors */
  --c-fr: #4f46e5;
  --c-afm: #d97706;
  --c-dt: #dc2626;
  --c-idt: #7c3aed;
  --c-audit: #059669;

  --scrollbar: #cbd5e1;
  --hdr-h: 60px;
  --tabs-h: 44px;
}

body {
  font-family: 'Sora', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

button, select, input, textarea { font-family: inherit; }
button { cursor: pointer; transition: all 0.15s; }
button:hover:not(:disabled) { opacity: 0.85; }
button:disabled { opacity: 0.35; cursor: not-allowed; }
a { text-decoration: none; color: inherit; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
@media print { .no-print { display: none !important; } body { background: white; } }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
@keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
@keyframes warPulse { 0%,100% { opacity:1 } 50% { opacity:0.75 } }
@keyframes streakGlow { 0%,100%{box-shadow:0 0 10px rgba(251,146,60,0.3)} 50%{box-shadow:0 0 20px rgba(251,146,60,0.6)} }
@keyframes mqShimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
@keyframes popIn { from{opacity:0;transform:scale(0.94)} to{opacity:1;transform:scale(1)} }
@keyframes countdownPop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes pulseOpacity { 0%,100%{opacity:1} 50%{opacity:0.65} }

.fu { animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) both; }
.fu1 { animation-delay: 0.04s; }
.fu2 { animation-delay: 0.08s; }
.fu3 { animation-delay: 0.12s; }
.fu4 { animation-delay: 0.16s; }
.fu5 { animation-delay: 0.20s; }

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* HEADER */
.hdr {
  height: var(--hdr-h);
  background: var(--nav);
  border-bottom: 1px solid var(--navBorder);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow);
  gap: 12px;
}
.hdr-logo {
  font-family: 'Sora', sans-serif;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.hdr-logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.hdr-pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  display: flex; align-items: center; gap: 6px;
}
.war-badge {
  background: rgba(220,38,38,0.12);
  border: 1px solid rgba(220,38,38,0.35);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 10px;
  font-weight: 800;
  color: #dc2626;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  animation: warPulse 2s infinite;
}
.dot-live {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e;
  animation: blink 2s infinite;
  display: inline-block;
  box-shadow: 0 0 6px rgba(34,197,94,0.5);
}

/* COUNTDOWN BANNER */
.countdown-banner {
  padding: 7px 20px;
  border-bottom: 1px solid var(--border);
}
.countdown-inner {
  max-width: 1300px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

/* MOTIVATIONAL QUOTE BAR */
.quote-bar {
  padding: 10px 20px 0;
  background: var(--bg);
}
.quote-inner {
  max-width: 1300px;
  margin: 0 auto;
}

/* TABS */
.tabs {
  display: none; /* hidden — replaced by sidebar */
}
.tab {
  padding: 0 16px;
  height: var(--tabs-h);
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.2px;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
}
.tab:hover:not(.on) { color: var(--text2); background: var(--surface2); opacity: 1; border-radius: 0; }
.tab.on { color: var(--text); border-bottom-color: #2563eb; }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; }

/* CONTENT */
.content { flex: 1; padding: 20px; max-width: 1300px; width: 100%; margin: 0 auto; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card-sm { padding: 13px 16px; }
.card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); }
.card-red { border-color: rgba(220,38,38,0.25); background: #fff5f5; }
.card-amber { border-color: rgba(217,119,6,0.25); background: #fffbeb; }
.card-green { border-color: rgba(22,163,74,0.25); background: #f0fdf4; }
.panel-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
}

/* ── BUTTONS ── */
.btn {
  border: none; border-radius: 9px; padding: 9px 18px;
  font-size: 12px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.btn-sm { padding: 6px 13px; font-size: 11px; border-radius: 7px; }
.btn-xs { padding: 4px 9px; font-size: 10px; border-radius: 6px; }
.b-red { background: #dc2626; color: #fff; }
.b-amber { background: #d97706; color: #fff; }
.b-green { background: #16a34a; color: #fff; }
.b-blue { background: #2563eb; color: #fff; }
.b-violet { background: #7c3aed; color: #fff; }
.b-cyan { background: #0891b2; color: #fff; }
.b-ghost { background: transparent; border: 1.5px solid var(--border2); color: var(--text2); }
.b-ghost:hover { border-color: var(--text2); color: var(--text); opacity: 1; }
.b-surface { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text2); }

/* ── INPUTS ── */
.inp {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: 9px;
  padding: 9px 13px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
}
.inp:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
.sel {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  outline: none;
}

/* ── BADGES ── */
.bdg {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 20px;
  font-size: 10px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.bdg-a { background: #fee2e2; color: #dc2626; }
.bdg-b { background: #fef3c7; color: #d97706; }
.bdg-c { background: var(--surface2); color: var(--text3); }

/* ── PROGRESS ── */
.bar-wrap { background: var(--surface3); border-radius: 99px; height: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1); }
.bar-thick { height: 7px; border-radius: 99px; }

/* ── DASHBOARD GRID ── */
@media (max-width: 700px) {
  .dash-grid { grid-template-columns: 1fr !important; }
}
.bar-thin { height: 3px; }

/* ── RING ── */
.ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }

/* ── MONO TEXT ── */
.mono { font-family: 'JetBrains Mono', monospace; }
.bebas { font-family: 'Sora', sans-serif; font-weight: 800; }

/* ── STAT BLOCK ── */
.stat-block {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.stat-val { font-size: 30px; font-weight: 800; font-family: 'JetBrains Mono', monospace; line-height: 1; }
.stat-lbl { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-top: 5px; font-weight: 600; }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 5px; }

/* ── CHAPTER ROW ── */
.ch-row {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 11px;
  margin-bottom: 6px;
  overflow: hidden;
  transition: all 0.15s;
}
.ch-row:hover { border-color: var(--border2); box-shadow: var(--shadow); }
.ch-row.expanded { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
.ch-row.high-risk { border-color: rgba(220,38,38,0.4); background: #fff8f8; }
.ch-row.med-risk { border-color: rgba(217,119,6,0.3); background: #fffef0; }
.ch-h {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; cursor: pointer;
  min-height: 46px;
}
.rev-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1.5px solid var(--border2);
  background: var(--surface2); color: var(--text3);
  font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.rev-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
.risk-bar {
  width: 4px; align-self: stretch; border-radius: 2px; flex-shrink: 0; min-height: 24px;
}

/* ── WAR MODE BANNER ── */
.war-mode-banner {
  background: linear-gradient(90deg, #fff1f2, #ffeef0);
  border: 1.5px solid rgba(220,38,38,0.35);
  border-radius: 12px;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px;
  animation: warPulse 3s infinite;
}

/* ── GRADE DISPLAY ── */
.grade-ring {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Sora', sans-serif;
  font-size: 28px;
  font-weight: 900;
  border: 2px solid;
}

/* ── MODAL ── */
.ov {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.55);
  z-index: 999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.mbox {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: 18px;
  padding: 26px;
  width: 100%;
  max-width: 440px;
  animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 24px 60px rgba(0,0,0,0.25);
}

/* ── PREDICTION GAUGE ── */
.gauge-track {
  height: 8px; border-radius: 4px;
  background: var(--surface3);
  overflow: hidden; position: relative;
}
.gauge-fill {
  height: 100%; border-radius: 4px;
  transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── SCROLL HINT ── */
.scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* ── SPARKLINE ── */
.sparkline { overflow: visible; }

/* ── DIVIDER ── */
.os-div {
  display: flex; align-items: center; gap: 10px;
  margin: 14px 0; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase;
}
.os-div-l { flex: 1; height: 1px; background: var(--border); }

/* ── SUBJECT TAB INDICATOR ── */
.sub-tab-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

/* ── EXECUTION SCORE ── */
.exec-grade {
  font-family: 'Sora', sans-serif;
  font-size: 48px;
  font-weight: 900;
  line-height: 1;
}

/* ── SETTINGS ── */
.sr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 0; border-bottom: 1px solid var(--border); gap: 16px;
}
.sr:last-child { border-bottom: none; }
.tog {
  width: 42px; height: 24px; border-radius: 99px;
  background: var(--border2); position: relative;
  border: none; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
}
.tog.on { background: #16a34a; }
.tog::after {
  content: '';
  position: absolute; width: 18px; height: 18px;
  background: #fff; border-radius: 50%;
  top: 3px; left: 3px; transition: left 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.tog.on::after { left: 21px; }

/* ── CHECKBOX ── */
.chkbox {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  border: 1.5px solid var(--border2); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.chkbox.done { background: #16a34a; border-color: #16a34a; }

/* ── HEATMAP ── */
.hmap { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.hmap-cell {
  aspect-ratio: 1; border-radius: 3px;
  background: var(--surface2);
  cursor: pointer; transition: transform 0.1s;
}
.hmap-cell:hover { transform: scale(1.4); z-index: 2; }

/* ── PLANNER ── */
.day-tab {
  padding: 8px 13px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text2);
  font-size: 11px; cursor: pointer; transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0; text-align: center;
}
.day-tab.on { background: #2563eb; border-color: #2563eb; color: #fff; font-weight: 700; }
.day-tab.ok { background: #f0fdf4; border-color: rgba(22,163,74,0.3); color: #16a34a; }

/* ── STEP DOTS ── */
.step-dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface2); border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--text3);
}
.step-dot.active { background: #2563eb; border-color: #2563eb; color: #fff; }
.step-dot.done { background: #16a34a; border-color: #16a34a; color: #fff; }

/* ── RISK METER ── */
.risk-meter-track {
  height: 7px; border-radius: 4px; overflow: hidden;
  background: linear-gradient(90deg, #16a34a 0%, #d97706 50%, #dc2626 100%);
  position: relative;
}
.risk-needle {
  position: absolute; top: -3px; width: 2px; height: 13px;
  background: #0f172a; border-radius: 1px;
  transform: translateX(-50%);
  box-shadow: 0 0 4px rgba(0,0,0,0.3);
  transition: left 0.8s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── MOCK ── */
.mt-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 13px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface); margin-bottom: 5px;
  transition: all 0.15s; cursor: pointer;
}
.mt-row:hover { border-color: var(--border2); box-shadow: var(--shadow); }
.mt-row.done-row { background: #f0fdf4; border-color: rgba(22,163,74,0.25); }

/* ── SCORE CARD ── */
.score-card {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

/* ── CARRY OVER ── */
.carry-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 13px; border-radius: 10px; margin-bottom: 5px;
  border: 1.5px solid rgba(217,119,6,0.25);
  background: #fffbeb;
  cursor: pointer;
}

/* ── SIDEBAR NAVIGATION ── */
:root { --sidebar-w: 240px; }
#sb-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,0.35); z-index: 300;
  backdrop-filter: blur(2px);
}
#sb-overlay.open { display: block; }
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border); z-index: 400;
  transform: translateX(calc(-1 * var(--sidebar-w)));
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-md); overflow-y: auto;
}
#sidebar.open { transform: translateX(0); }
.sb-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.sb-section-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); padding: 14px 16px 6px; }
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; border: none; background: transparent;
  width: 100%; text-align: left; color: var(--text2);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.12s; font-family: 'Sora', sans-serif;
}
.sb-item:hover { background: var(--surface2); color: var(--text); opacity: 1; }
.sb-item.active { background: #eff6ff; color: #2563eb; font-weight: 700; }
.sb-icon { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
.sb-risk-dot { margin-left: auto; width: 7px; height: 7px; border-radius: 50%; background: #dc2626; flex-shrink: 0; }
.sb-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); }
.hbg { background: none; border: none; width: 36px; height: 36px; border-radius: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.hbg:hover { background: var(--surface2); opacity: 1; }
.hbg span { display: block; width: 18px; height: 2px; background: var(--text2); border-radius: 2px; }
.quicktab { padding: 6px 14px; border: 1px solid transparent; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.15s; font-family: 'Sora', sans-serif; }
.quicktab:hover { background: var(--surface2); opacity: 1; }
.quicktab.active { background: #eff6ff; color: #2563eb; border-color: rgba(37,99,235,0.25); }

/* ── SUBJECT HUB ── */
.sub-hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap: 14px; margin-bottom: 20px; }
.sub-hub-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
.sub-hub-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border2); }

/* ── BLUEPRINT PLANNER ── */

function todayStr() { return new Date().toISOString().slice(0, 10); }

function fmtDate(start, off) {

function migrateChapter(ch) {

// ── Auto-reschedule: move missed undone chapters into upcoming days ──
function detectBacklog() {
  const today = new Date(); today.setHours(0,0,0,0);
  const backlog = []; // [{planId, dayIdx, chIdx, ch}]
  plans.forEach(plan => {
    (plan.days || []).forEach((day, di) => {
      const dayDate = new Date(plan.startDate);
      dayDate.setDate(dayDate.getDate() + di);
      dayDate.setHours(0,0,0,0);
      if (dayDate < today) {
        (day.chapters || []).forEach((ch, ci) => {
          if (!ch.done) backlog.push({ planId: plan.id, dayIdx: di, chIdx: ci, ch });
        });
      }
    });
  });
  return backlog;
}

function autoAdjustPlanner() {
  const today = new Date(); today.setHours(0,0,0,0);
  let changed = false;

  plans.forEach(plan => {
    // Collect missed undone chapters
    const missed = [];
    (plan.days || []).forEach((day, di) => {
      const dayDate = new Date(plan.startDate);
      dayDate.setDate(dayDate.getDate() + di);
      dayDate.setHours(0,0,0,0);
      if (dayDate < today) {
        const remaining = (day.chapters || []).filter(ch => !ch.done);
        if (remaining.length) {
          // Remove them from the past day
          day.chapters = day.chapters.filter(ch => ch.done);
          missed.push(...remaining);
          changed = true;
        }
      }
    });

    if (!missed.length) return;

    // Find future days (index where dayDate >= today)
    const futureDayIndices = [];
    (plan.days || []).forEach((day, di) => {
      const dayDate = new Date(plan.startDate);
      dayDate.setDate(dayDate.getDate() + di);
      dayDate.setHours(0,0,0,0);
      if (dayDate >= today) futureDayIndices.push(di);
    });

    // If no future days exist, extend plan with extra days
    if (!futureDayIndices.length) {
      const extraDays = Math.ceil(missed.length / 3);
      for (let i = 0; i < extraDays; i++) {
        plan.days.push({ chapters: [] });
        plan.totalDays = plan.days.length;
        futureDayIndices.push(plan.days.length - 1);
      }
    }

    // Spread missed chapters across future days (round-robin, max 3 extras/day)
    missed.forEach((ch, i) => {
      const targetDayIdx = futureDayIndices[i % futureDayIndices.length];
      plan.days[targetDayIdx].chapters.push(ch);
    });
  });

  if (changed) saveP();
}

// ══════════════════════════════════════════════════════
// RISK ENGINE
// ══════════════════════════════════════════════════════
function daysSinceDate(dateStr) {
  if (!dateStr) return 999;
  return Math.floor((new Date() - new Date(dateStr)) / 86400000);
}

function calcRetentionScore(rev) {
  // Ebbinghaus forgetting curve approximation
  if (!rev.done) return 0;
  const days = daysSinceDate(rev.date);
  const halfLife = 7; // days before ~50% retention
  return Math.round(100 * Math.exp(-0.693 * days / halfLife));
}

function calcRiskScore(ch) {
  const catW = CAT_WEIGHT[ch.category] || 1;
  const rev0 = ch.revisions[0];
  const daysSince = rev0.date ? daysSinceDate(rev0.date) : 999;
  const overdueRevs = ch.revisions.filter((r, i) => i > 0 && !r.done && ch.revisions[i-1].done).length;
  const mockPenalty = ch.mockAverage !== null ? (100 - ch.mockAverage) / 20 : 0;
  const notStarted = !rev0.done ? 40 : 0;
  const retentionScore = rev0.done ? calcRetentionScore(rev0) : 0;
  const retentionPenalty = rev0.done ? (100 - retentionScore) / 10 : 0;
  const dl = daysLeft();
  const urgency = dl <= 30 ? 2 : dl <= 60 ? 1.5 : 1;

  let risk = (
    (catW * 10) +
    (Math.min(daysSince, 30) / 3) +
    (overdueRevs * 8) +
    mockPenalty +
    notStarted +
    retentionPenalty
  ) * urgency;

  // Cap at 100
  return Math.min(100, Math.round(risk));
}

function calcPriorityIndex(ch) {
  const risk = ch.riskScore || 0;
  const catW = CAT_WEIGHT[ch.category] || 1;
  const confidence = 100 - (ch.confidenceScore || 50);
  return Math.round((risk * 0.6) + (catW * 10) + (confidence * 0.3));
}

function runRiskEngine() {
  order.forEach(sk => {
    (D[sk]?.chapters || []).forEach(ch => {
      ch.riskScore = calcRiskScore(ch);
      ch.daysSinceTouch = ch.revisions[0].date ? daysSinceDate(ch.revisions[0].date) : 999;
      // Update retention scores
      ch.revisions.forEach(r => { if (r.done) r.retentionScore = calcRetentionScore(r); });
      ch.priorityIndex = calcPriorityIndex(ch);
    });
  });
}

// ══════════════════════════════════════════════════════
// METRICS ENGINE
// ══════════════════════════════════════════════════════
function computeMetrics() {
  const allC = order.flatMap(k => (D[k]?.chapters || []).map(c => ({ ...c, _sub: k })));
  const dl = daysLeft();

  // Basic progress
  const rev1Done = allC.filter(c => c.revisions[0].done).length;
  const rev2Done = allC.filter(c => c.revisions[1].done).length;
  const total = allC.length;
  const rev1Pct = total ? Math.round(rev1Done / total * 100) : 0;
  const rev2Pct = total ? Math.round(rev2Done / total * 100) : 0;

  // Category A coverage
  const catA = allC.filter(c => c.category === 'A');
  const catADone = catA.filter(c => c.revisions[0].done).length;
  const catAPct = catA.length ? Math.round(catADone / catA.length * 100) : 0;

  // Risk
  const highRisk = allC.filter(c => c.riskScore >= 60).sort((a,b) => b.riskScore - a.riskScore);
  const totalRisk = allC.reduce((s, c) => s + c.riskScore, 0);
  const avgRisk = total ? Math.round(totalRisk / total) : 0;

  // Required daily load
  const pendingRev1 = total - rev1Done;
  const dailyLoad = dl > 0 ? Math.ceil(pendingRev1 / dl) : pendingRev1;

  // Study velocity (chapters per day)
  const sessHrs = studySessions.reduce((a, s) => a + (s.duration || 0), 0);
  const firstSession = studySessions.length ? studySessions[0].date : null;
  const studyDays = firstSession ? Math.max(1, daysSinceDate(firstSession)) : 1;
  const velocity = rev1Done > 0 ? Math.round((rev1Done / studyDays) * 10) / 10 : 0;

  // Predicted completion
  const daysToFinish = velocity > 0 ? Math.ceil(pendingRev1 / velocity) : null;

  // Mock stats
  const mockedChs = allC.filter(c => mocks[c.id]?.done).length;
  const mockPct = total ? Math.round(mockedChs / total * 100) : 0;
  const allMockScores = allC.flatMap(c => c.mockAverage !== null ? [c.mockAverage] : []);
  const avgMockScore = allMockScores.length
    ? Math.round(allMockScores.reduce((a,b) => a+b, 0) / allMockScores.length)
    : null;

  // Predicted final score (0-800 for 8 papers)
  // Formula: base on rev1Pct (50% weight), catA coverage (30%), mock avg (20%)
  const baseFromRev = (rev1Pct / 100) * 400;
  const baseFromCatA = (catAPct / 100) * 240;
  const baseFromMock = avgMockScore !== null ? (avgMockScore / 100) * 160 : baseFromRev * 0.2;
  const riskPenalty = (avgRisk / 100) * 80;
  const rawPred = baseFromRev * 0.5 + baseFromCatA * 0.3 + baseFromMock * 0.2 - riskPenalty;
  const predictedScore = Math.min(800, Math.max(0, Math.round(rawPred)));
  const predictedScoreIfStagnant = Math.max(0, Math.round(predictedScore * 0.93 - 20));

  // Today's execution score
  const todayH = studySessions.filter(s => s.date === todayStr()).reduce((a, s) => a + s.duration, 0);
  const todayCh = allC.filter(c => c.revisions[0].date === todayStr() && c.revisions[0].done).length;
  const dailyHrTarget = settings.dailyHourTarget || 6;
  const hrPct = Math.min(100, (todayH / dailyHrTarget) * 100);
  const chPct = Math.min(100, (todayCh / Math.max(1, dailyLoad)) * 100);
  // Risk reduced today: chapters done today that were high risk
  const riskReducedToday = allC.filter(c => c.revisions[0].date === todayStr() && c.riskScore < 40).length;
  const riskPct = Math.min(100, (riskReducedToday / Math.max(1, highRisk.length)) * 100);
  const execScore = Math.round((hrPct * 0.4) + (chPct * 0.4) + (riskPct * 0.2));
  const execGrade = execScore >= 90 ? 'S' : execScore >= 75 ? 'A' : execScore >= 60 ? 'B' : execScore >= 40 ? 'C' : 'D';
  const execGradeCol = execScore >= 90 ? '#00e676' : execScore >= 75 ? '#69f0ae' : execScore >= 60 ? '#ffb324' : execScore >= 40 ? '#ff7043' : '#ff3d3d';

  // Study streak
  const streak = calcStreak();

  // Subject-level
  const subMetrics = {};
  order.forEach(sk => {
    const chs = D[sk]?.chapters || [];
    const r1 = chs.filter(c => c.revisions[0].done).length;
    const r2 = chs.filter(c => c.revisions[1].done).length;
    const r1p = chs.length ? Math.round(r1 / chs.length * 100) : 0;
    const r2p = chs.length ? Math.round(r2 / chs.length * 100) : 0;
    const catA2 = chs.filter(c => c.category === 'A');
    const catA2D = catA2.filter(c => c.revisions[0].done).length;
    const catA2P = catA2.length ? Math.round(catA2D / catA2.length * 100) : 0;
    const avgR = Math.round(chs.reduce((s, c) => s + c.riskScore, 0) / Math.max(1, chs.length));
    const mDone = chs.filter(c => mocks[c.id]?.done).length;
    const target = parseInt(visionBoard.targets?.[sk] || 0) || 0;
    subMetrics[sk] = { r1, r2, total: chs.length, r1p, r2p, catA2P, avgRisk: avgR, mDone, target };
  });

  return {
    rev1Done, rev2Done, total, rev1Pct, rev2Pct,
    catA, catADone, catAPct,
    highRisk, avgRisk,
    dailyLoad, pendingRev1,
    velocity, daysToFinish,
    sessHrs, todayH,
    mockedChs, mockPct, avgMockScore,
    predictedScore, predictedScoreIfStagnant,
    execScore, execGrade, execGradeCol,
    streak, dl,
    subMetrics
  };
}

// ── Streak: timestamp-based 24h model ────────────────────────────
const STREAK_TS_KEY = "ca-v6-streakTs"; // stores last activity timestamp (ms)
const STREAK_CNT_KEY = "ca-v6-streakCnt"; // stores current streak count

function _loadStreakTs() {
  try { return parseInt(localStorage.getItem(STREAK_TS_KEY)||"0"); } catch(x){ return 0; }
}
function _saveStreakTs(ts) {
  try { localStorage.setItem(STREAK_TS_KEY, String(ts)); } catch(x){} }

function _loadStreakCnt() {
  try { return parseInt(localStorage.getItem(STREAK_CNT_KEY)||"0"); } catch(x){ return 0; }
}
function _saveStreakCnt(n) {
  try { localStorage.setItem(STREAK_CNT_KEY, String(n)); } catch(x){} }

// Called whenever the user does something meaningful (chapter tick, planner tick, timer save)
function recordActivity() {
  const now = Date.now();
  const lastTs = _loadStreakTs();
  const gap = now - lastTs; // ms since last activity
  let cnt = _loadStreakCnt();
  if(lastTs === 0) {
    // First-ever activity
    cnt = 1;
  } else if(gap > 48 * 3600 * 1000) {
    // More than 48h gap — reset (generous: covers 1 missed day without punishing)
    cnt = 1;
  } else if(gap > 24 * 3600 * 1000) {
    // Between 24h and 48h — continues streak
    cnt++;
  }
  // Within 24h — same day, no change to count, just update timestamp
  _saveStreakTs(now);
  _saveStreakCnt(cnt);
}

function calcStreak() {
  // Hybrid: use timestamp model if available, else fall back to session-date count
  const ts = _loadStreakTs();
  const cnt = _loadStreakCnt();
  if(ts > 0) {
    // If last activity was > 48h ago, streak has expired
    if((Date.now() - ts) > 48 * 3600 * 1000) return 0;
    return cnt;
  }
  // Legacy fallback: calculate from studySessions dates (backward compat)
  const dates = [...new Set(studySessions.map(s => s.date))].sort();
  if (!dates.length) return 0;
  let streak = 0;
  const today = todayStr();
  let d = new Date(today);
  while (true) {
    const ds = d.toISOString().slice(0, 10);
    if (dates.includes(ds)) { streak++; d.setDate(d.getDate() - 1); }
    else break;
    if (streak > 365) break;
  }
  // Migrate to new model on first read
  if(streak > 0) { _saveStreakCnt(streak); _saveStreakTs(Date.now()); }
  return streak;
}

function todayHrs() {
  return Math.round(studySessions.filter(s => s.date === todayStr()).reduce((a, s) => a + s.duration, 0) * 10) / 10;
}

// ══════════════════════════════════════════════════════
// AUTO SCHEDULER
// ══════════════════════════════════════════════════════
function generateAutoSchedule() {
  const allPending = order.flatMap(k =>
    (D[k]?.chapters || [])
      .filter(c => !c.revisions[0].done)
      .map(c => ({ ...c, _sub: k, _subName: D[k]?.short }))
  ).sort((a, b) => b.priorityIndex - a.priorityIndex);

  const dl = daysLeft();
  const dailyLoad = Math.max(3, Math.ceil(allPending.length / Math.max(1, dl)));
  const warLoad = isWarMode() ? Math.ceil(dailyLoad * 1.3) : dailyLoad;

  // Today's auto schedule
  const todays = allPending.slice(0, warLoad);
  return {
    total: allPending.length,
    dailyLoad: warLoad,
    todays,
    remaining: allPending.slice(warLoad)
  };
}

// ══════════════════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════════════════
function ring(pct, col, sz = 60, sw = 5) {
  const r = (sz - sw * 2) / 2, c = 2 * Math.PI * r, off = c - (pct / 100) * c;
  return `<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="${sw}"/>
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" stroke-linecap="round" style="transition:stroke-dashoffset .7s"/>
  </svg>`;
}
function ringW(pct, col, sz = 60, sw = 5, sub = "") {
  return `<div class="ring-wrap" style="width:${sz}px;height:${sz}px">${ring(pct, col, sz, sw)}
    <div style="position:absolute;text-align:center;pointer-events:none">
      <div class="mono" style="font-size:${sz<52?10:12}px;font-weight:700;color:${col};line-height:1">${pct}%</div>
      ${sub ? `<div style="font-size:8px;color:var(--text3);margin-top:1px">${sub}</div>` : ""}
    </div>
  </div>`;
}
function riskColor(score) {
  if (score >= 70) return "#dc2626";
  if (score >= 40) return "#d97706";
  return "#16a34a";
}
function riskClass(score) {
  if (score >= 70) return "high-risk";
  if (score >= 40) return "med-risk";
  return "";
}
function riskBarColor(score) {
  if (score >= 70) return "#dc2626";
  if (score >= 40) return "#d97706";
  return "#16a34a";
}
function gradBar(lbl, pct, col, showPct = true) {
  return `<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <span style="font-size:12px;color:var(--text2)">${lbl}</span>
      ${showPct ? `<span class="mono" style="font-size:11px;color:${col};font-weight:700">${pct}%</span>` : ""}
    </div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
  </div>`;
}
function chkSvg() { return `<svg width="11" height="11" viewBox="0 0 10 10"><path d="M1.5 5l2.5 2.5 4.5-4.5" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/></svg>`; }
function sparkline(vals, col, w = 80, h = 20) {
  if (!vals || vals.length < 2) return "";
  const mx = Math.max(...vals, 1);
  const pts = vals.map((v, i) => `${(i / (vals.length - 1) * w).toFixed(1)},${(h - v / mx * h * 0.9).toFixed(1)}`).join(" ");
  const id = "sg" + Math.random().toString(36).slice(2);
  return `<svg width="${w}" height="${h}" style="overflow:visible">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".15"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="0,${h} ${pts} ${w},${h}" fill="url(#${id})"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">

    ${!hasPlan?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px">

  // ── BLUEPRINT TASKS TODAY (from Calendar plan) ──────────────────
  const bpTodayCard = bpTodayTasks.length > 0 ? (()=>{
    const rows = bpTodayTasks.map(t => {

  // ── LAYOUT ──

  const progressCard2 = `

        ].map(({lbl,pct,col,sub})=>`
          <div>

              <span style="font-size:12px;font-weight:600;color:var(--text2)">${lbl}</span>

            </div>

      <div class="panel-label">📚 Subjects</div>

          const s=D[sk];const sm=M.subMetrics[sk];
          return `<div style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 8px;border-radius:9px;background:var(--surface2)" onclick="setTab('${sk}')">

  return `

function sortedChs(sk) {
  const s = D[sk]; if (!s) return [];
  const sf = sortBy[sk] || "risk", ff = filterBy[sk] || "all";
  let list = s.chapters.map((c, i) => ({ ...c, _realIdx: i }));
  if (ff === "pending") list = list.filter(c => !c.revisions[0].done);
  else if (ff === "done") list = list.filter(c => c.revisions[0].done);
  else if (ff !== "all") list = list.filter(c => c.category === ff);
  if (sf === "risk") list.sort((a, b) => b.riskScore - a.riskScore);
  else if (sf === "cat") list.sort((a,b) => "ABC".indexOf(a.category) - "ABC".indexOf(b.category));
  else if (sf === "priority") list.sort((a, b) => b.priorityIndex - a.priorityIndex);
  else if (sf === "pending") list.sort((a,b) => (a.revisions[0].done?1:-1)-(b.revisions[0].done?1:-1));
  return list;
}

function renderSub(sk) {
  const s = D[sk]; if (!s) return "";
  const chs = sortedChs(sk);
  const sf = sortBy[sk] || "risk", ff = filterBy[sk] || "all";
  const col = s.color;

  // Stats
  const r1 = s.chapters.filter(c => c.revisions[0].done).length;
  const r2 = s.chapters.filter(c => c.revisions[1].done).length;
  const r3 = s.chapters.filter(c => c.revisions[2].done).length;
  const r4 = s.chapters.filter(c => c.revisions[3].done).length;
  const tot = s.chapters.length;
  const r1p = tot ? Math.round(r1/tot*100) : 0;
  const highR = s.chapters.filter(c => c.riskScore >= 60).length;
  const avgRisk = Math.round(s.chapters.reduce((s2,c) => s2+c.riskScore, 0) / Math.max(1, tot));
  const mDone = s.chapters.filter(c => mocks[c.id]?.done).length;

  const revCols = ["#2563eb","#0891b2","#16a34a","#d97706"];

  const header = `<div class="card" style="border-left:4px solid ${col};margin-bottom:14px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div class="mono" style="font-size:10px;color:${col};letter-spacing:2px;margin-bottom:4px;font-weight:700">${s.short} SUBJECT</div>
        <div style="font-size:20px;font-weight:800;color:var(--text)">${s.name}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:3px">${tot} chapters · ${r1} done (Rev 1) · ${highR} high-risk · ${mDone} tested</div>
      </div>
      <div style="display:flex;gap:14px;align-items:center">
        ${[0,1,2,3].map(i => `<div style="text-align:center">
          ${ringW([r1,r2,r3,r4][i]/tot*100|0, revCols[i], 44, 3)}
          <div style="font-size:9px;color:var(--text3);margin-top:3px">R${i+1}</div>
        </div>`).join("")}
        <div style="text-align:center">
          <div class="mono" style="font-size:22px;font-weight:700;color:${avgRisk>=60?"#dc2626":avgRisk>=40?"#d97706":"#16a34a"}">${avgRisk}</div>
          <div style="font-size:9px;color:var(--text3)">Avg Risk</div>
        </div>
      </div>
    </div>
  </div>`;

  const controls = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <select class="sel" onchange="sortBy['${sk}']=this.value;render()">
      <option value="risk" ${sf==="risk"?"selected":""}>Sort: Risk Score ↓</option>
      <option value="priority" ${sf==="priority"?"selected":""}>Sort: Priority Index ↓</option>
      <option value="cat" ${sf==="cat"?"selected":""}>Sort: A → B → C</option>
      <option value="pending" ${sf==="pending"?"selected":""}>Sort: Pending First</option>
    </select>
    <select class="sel" onchange="filterBy['${sk}']=this.value;render()">
      <option value="all" ${ff==="all"?"selected":""}>All (${tot})</option>
      <option value="A" ${ff==="A"?"selected":""}>Cat A (${s.chapters.filter(c=>c.category==='A').length})</option>
      <option value="B" ${ff==="B"?"selected":""}>Cat B (${s.chapters.filter(c=>c.category==='B').length})</option>
      <option value="C" ${ff==="C"?"selected":""}>Cat C (${s.chapters.filter(c=>c.category==='C').length})</option>
      <option value="pending" ${ff==="pending"?"selected":""}>Pending Rev 1</option>
      <option value="done" ${ff==="done"?"selected":""}>Done Rev 1</option>
    </select>
    <div style="flex:1"></div>
    <button class="btn b-surface btn-sm" onclick="addChSub='${sk}';newChName='';render()">+ Chapter</button>
  </div>`;

  const addForm = addChSub === sk ? `<div class="card card-sm" style="margin-bottom:10px;border-color:var(--border2)">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input class="inp" style="flex:1;min-width:160px" placeholder="Chapter name…" value="${esc(newChName)}" oninput="newChName=this.value" onkeydown="if(event.key==='Enter')addCh('${sk}')"/>
      <select class="sel" onchange="newChCat=this.value">
        <option value="A" ${newChCat==="A"?"selected":""}>Cat A</option>
        <option value="B" ${newChCat==="B"?"selected":""}>Cat B</option>
        <option value="C" ${newChCat==="C"?"selected":""}>Cat C</option>
      </select>
      <button class="btn b-green btn-sm" onclick="addCh('${sk}')">✓ Add</button>
      <button class="b-ghost btn btn-sm" onclick="addChSub=null;newChName='';render()">✕</button>
    </div>
  </div>` : "";

  const rows = chs.map(ch => {
    const ex = expCh === ch.id;
    const rev0done = ch.revisions[0].done;
    const rc = riskBarColor(ch.riskScore);
    const mDoneC = mocks[ch.id]?.done;

    const revBtns = [0,1,2,3].map(i => {
      const rd = ch.revisions[i].done;
      const c2 = revCols[i];
      return `<div class="rev-btn" style="border-color:${rd?c2:"var(--border2)"};background:${rd?c2+"20":"transparent"};color:${rd?c2:"var(--text3)"}"
        onclick="event.stopPropagation();toggleRev('${sk}','${ch.id}',${i})">R${i+1}</div>`;
    }).join("");

    const expanded = ex ? `<div style="padding:16px;border-top:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap">
      <div>
        <div style="font-size:9px;color:var(--text3);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Risk Breakdown</div>
        <div class="mono" style="font-size:32px;font-weight:700;color:${rc}">${ch.riskScore}</div>
        <div style="font-size:10px;color:var(--text3)">Priority: ${ch.priorityIndex}</div>
        <div style="font-size:10px;color:var(--text3)">Days since: ${ch.daysSinceTouch < 999 ? ch.daysSinceTouch+"d" : "Never"}</div>
        <div style="font-size:10px;color:var(--text3)">Retention: ${ch.revisions[0].done ? calcRetentionScore(ch.revisions[0])+"%" : "—"}</div>
      </div>
      <div>
        <div style="font-size:9px;color:var(--text3);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Category</div>
        <div style="display:flex;gap:5px">${["A","B","C"].map(cat => {
          const cc = {A:"#dc2626",B:"#d97706",C:"var(--text3)"}[cat];
          return `<button class="btn btn-sm" style="background:${ch.category===cat?cc+"22":"transparent"};border:1px solid ${cc};color:${cc};border-radius:5px" onclick="changeCat('${sk}','${ch.id}','${cat}')">${cat}</button>`;
        }).join("")}</div>
        <div style="margin-top:10px">
          <div style="font-size:9px;color:var(--text3);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Confidence</div>
          <input type="range" min="0" max="100" value="${ch.confidenceScore||50}"
            style="width:120px;accent-color:#2563eb"
            oninput="setConfidence('${sk}','${ch.id}',parseInt(this.value))"/>
          <span class="mono" style="font-size:11px;color:#2563eb;margin-left:6px">${ch.confidenceScore||50}%</span>
        </div>
        <div style="margin-top:10px">
          <div style="font-size:9px;color:var(--text3);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Mock Score</div>
          <input type="number" min="0" max="100" value="${ch.mockAverage||""}" placeholder="0-100"
            style="width:70px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:4px 7px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px"
            oninput="setMockScore('${sk}','${ch.id}',parseInt(this.value)||null)"/>
        </div>
      </div>
      <div style="flex:1;min-width:160px">
        <div style="font-size:9px;color:var(--text3);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Notes</div>
        ${editNotes === ch.id
          ? `<div style="display:flex;gap:7px"><textarea class="inp" style="flex:1;min-height:60px;resize:vertical;font-size:12px" id="na_${ch.id}">${esc(ch.notes||"")}</textarea>
              <div style="display:flex;flex-direction:column;gap:5px">
                <button class="btn b-green btn-sm" onclick="saveNotes('${sk}','${ch.id}')">Save</button>
                <button class="b-ghost btn btn-sm" onclick="editNotes=null;render()">✕</button>
              </div></div>`
          : `<div style="display:flex;gap:8px;align-items:flex-start">
              <div style="flex:1;font-size:12px;color:${ch.notes?"var(--text2)":"var(--text3)"};font-style:${ch.notes?"normal":"italic"};min-height:24px">${esc(ch.notes||"No notes…")}</div>
              <button class="b-ghost btn btn-sm" onclick="editNotes='${ch.id}';render()">Edit</button>
            </div>`
        }
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px;margin-left:auto">
        <div class="chkbox ${mDoneC?"done":""}" onclick="toggleChMock('${ch.id}')" title="Toggle mock test">${mDoneC?chkSvg():""}</div>
        <span style="font-size:11px;color:${mDoneC?"#16a34a":"var(--text3)"}">Tested</span>
        <button class="btn btn-sm" style="background:transparent;color:#dc2626;border:1px solid rgba(255,61,61,0.2);margin-left:12px" onclick="delCh('${sk}','${ch.id}')">Delete</button>
      </div>
    </div>` : "";

    return `<div class="ch-row ${ex?"expanded":riskClass(ch.riskScore)}" style="margin-bottom:5px">
      <div class="ch-h" onclick="toggleExpand('${ch.id}')">
        <div class="risk-bar" style="background:${rc};opacity:${Math.max(0.3, ch.riskScore/100)}"></div>
        <span class="mono" style="font-size:9px;min-width:22px;color:${rc}">${ch.riskScore}</span>
        <span style="flex:1;font-size:${settings.compact?11:12.5}px;font-weight:${rev0done?400:500};color:${rev0done?"var(--text3)":"var(--text)"};text-decoration:${rev0done?"line-through":"none"}">${esc(ch.name)}</span>
        ${mDoneC?`<span style="font-size:9px;color:#16a34a;background:rgba(22,163,74,0.10);padding:1px 6px;border-radius:3px">🧪</span>`:""}
        <div style="display:flex;gap:3px" onclick="event.stopPropagation()">${revBtns}</div>
        <span class="bdg ${ch.category==='A'?'bdg-a':ch.category==='B'?'bdg-b':'bdg-c'}">${ch.category}</span>
        <span style="color:var(--text3);font-size:10px;flex-shrink:0">${ex?"▲":"▼"}</span>
      </div>
      ${expanded}
    </div>`;
  }).join("");

  return header + controls + addForm + rows +
    (!chs.length ? `<div style="text-align:center;padding:40px;color:var(--text3)">No chapters match this filter</div>` : "");
}

function renderVision() {
  const M = computeMetrics();
  const subColors = { FR:"#7c83ff",AFM:"#ffb324",DT:"#ff5252",IDT:"#b388ff",Audit:"#00e676" };
  const subBg = { FR:"rgba(124,131,255,0.06)",AFM:"rgba(255,179,36,0.06)",DT:"rgba(255,82,82,0.06)",IDT:"rgba(179,136,255,0.06)",Audit:"rgba(0,230,118,0.06)" };

  const targetGrid = `<div class="card fu" style="margin-bottom:14px">
    <div class="panel-label">🎯 Target Marks per Subject</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">
      ${order.map(sk => {
        const col = D[sk]?.color || "#fff";
        const sm = M.subMetrics[sk];
        const val = visionBoard.targets?.[sk] || "";
        const tgtN = parseInt(val) || 0;
        const onTrack = tgtN > 0 && sm.r1p >= tgtN * 0.7;
        return `<div style="background:${subBg[sk]||"var(--surface2)"};border:1px solid ${col}22;border-radius:8px;padding:14px 10px;text-align:center">

function fmtFlip(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60;
  return { h: String(h).padStart(2,'0'), m: String(m).padStart(2,'0'), s: String(sc).padStart(2,'0') };
}
// ── Timestamp-based timer (immune to tab throttling) ──────────────
function _timerSync() {
  // Called every tick: compute true remain from wall-clock difference
  if (!flipTimerRunning) return;
  const nowElapsed = _timerElapsed + (Date.now() - _timerStartTs);
  flipTimerRemain = Math.max(0, flipTimerGoal - Math.floor(nowElapsed / 1000));
}

// ── Timer persistence across page refresh ─────────────────────────
function saveTimerState() {
  try {
    localStorage.setItem(TIMER_STATE_KEY, JSON.stringify({
      startTs:  _timerStartTs,
      elapsed:  _timerElapsed,
      running:  flipTimerRunning,
      goal:     flipTimerGoal,
      label:    flipTimerLabel
    }));
  } catch(x) {}
}

function loadTimerState() {
  try {
    const raw = localStorage.getItem(TIMER_STATE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (!s || !s.goal) return; // nothing useful stored

    flipTimerGoal  = s.goal  || 0;
    flipTimerLabel = s.label || "";
    flipTimerSetMode = false; // we have a session in progress

    if (s.running && s.startTs) {
      // Timer was running when page closed — account for time elapsed while page was gone
      _timerStartTs = s.startTs;
      _timerElapsed = s.elapsed || 0;
      // Compute remain immediately so display is correct before first tick
      const nowElapsed = _timerElapsed + (Date.now() - _timerStartTs);
      flipTimerRemain = Math.max(0, flipTimerGoal - Math.floor(nowElapsed / 1000));
      if (flipTimerRemain > 0) {
        flipTimerRunning = true;
        clearInterval(flipTimerInterval);
        flipTimerInterval = setInterval(flipTick, 500);
      } else {
        // Time ran out while page was away — mark as done, don't auto-start
        flipTimerRunning = false;
        flipTimerRemain = 0;
      }
    } else {
      // Timer was paused — restore paused state
      _timerElapsed  = s.elapsed || 0;
      _timerStartTs  = 0;
      flipTimerRunning = false;
      flipTimerRemain = Math.max(0, flipTimerGoal - Math.floor(_timerElapsed / 1000));
    }
  } catch(x) {}
}
function flipStart() {
  if(!flipTimerGoal){alert("Set duration first");return;}
  _timerElapsed = 0;
  _timerStartTs = Date.now();
  flipTimerRemain = flipTimerGoal;
  flipTimerRunning = true;
  flipTimerSetMode = false;
  clearInterval(flipTimerInterval);
  flipTimerInterval = setInterval(flipTick, 500); // 500ms poll for accuracy
  saveTimerState();
  render();
}
function flipPause() {
  // Snapshot elapsed before pausing
  _timerElapsed += Date.now() - _timerStartTs;
  clearInterval(flipTimerInterval);
  flipTimerRunning = false;
  saveTimerState();
  render();
}
function flipResume() {
  _timerStartTs = Date.now(); // resume from now, elapsed already captured
  flipTimerRunning = true;
  clearInterval(flipTimerInterval);
  flipTimerInterval = setInterval(flipTick, 500);
  saveTimerState();
  render();
}
function flipReset() {
  clearInterval(flipTimerInterval);
  flipTimerRunning = false;
  _timerElapsed = 0;
  _timerStartTs = 0;
  flipTimerRemain = flipTimerGoal;
  flipTimerSetMode = true;
  try { localStorage.removeItem(TIMER_STATE_KEY); } catch(x) {}
  render();
}
function flipSetGoal(m) { flipTimerGoal=m*60; flipTimerRemain=flipTimerGoal; _timerElapsed=0; }
function flipSaveSession() {
  // Use real elapsed time from timestamps when running, else snapshot
  const totalElapsedMs = flipTimerRunning
    ? _timerElapsed + (Date.now() - _timerStartTs)
    : _timerElapsed;
  const elapsed = Math.min(flipTimerGoal, Math.floor(totalElapsedMs / 1000));
  const hrs = Math.round((elapsed / 3600) * 10) / 10;
  if(hrs < 0.05){alert("Session too short"); return;}
  studySessions.push({date:todayStr(), duration:hrs, label:(flipTimerLabel||"Focus Session").trim().slice(0,50)});
  // Record activity for streak (timer > 10 min)
  if(hrs >= 10/60) recordActivity();
  saveVB();
  clearInterval(flipTimerInterval);
  flipTimerRunning = false;
  flipTimerSetMode = true;
  flipTimerGoal = 0;
  flipTimerRemain = 0;
  _timerElapsed = 0;
  try { localStorage.removeItem(TIMER_STATE_KEY); } catch(x) {}
  render();
}
function deleteSession(idx) { studySessions.splice(idx,1);saveVB();render(); }
// Wake lock handle
let _wakeLock = null;
async function requestWakeLock() {
  try { if('wakeLock' in navigator){ _wakeLock = await navigator.wakeLock.request('screen'); } } catch(x){}
}
async function releaseWakeLock() {
  try { if(_wakeLock){ await _wakeLock.release(); _wakeLock=null; } } catch(x){}
}

// Focus mode
let focusModeActive = false;
function enterFocusMode() {
  focusModeActive = true;
  const el = document.getElementById('focus-overlay');
  if(el){ el.style.display='flex'; updateFocusDisplay(); }
  try { document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); } catch(x){}
  requestWakeLock();
}
function exitFocusMode() {
  focusModeActive = false;
  const el = document.getElementById('focus-overlay');
  if(el) el.style.display='none';
  try { document.fullscreenElement && document.exitFullscreen && document.exitFullscreen(); } catch(x){}
  releaseWakeLock();
}
function updateFocusDisplay() {
  const f = fmtFlip(flipTimerRemain);
  const timeStr = flipTimerGoal>=3600 ? `${f.h}:${f.m}:${f.s}` : `${f.m}:${f.s}`;
  const el = document.getElementById('focus-time');
  if(el) el.textContent = timeStr;
  // Status label
  const sl = document.getElementById('focus-status');
  if(sl) sl.textContent = flipTimerRemain<=0?'Done! 🎉':flipTimerRunning?'':flipTimerSetMode?'':('Paused');
}

function flipTick() {
  // Sync remain from real wall-clock time (immune to tab throttling)
  _timerSync();
  if(flipTimerRemain<=0){
    clearInterval(flipTimerInterval);
    flipTimerRunning=false;
    releaseWakeLock();
    try{const c=new AudioContext();[0,0.15,0.3].forEach(t=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,c.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.4);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.4);});}catch(x){}
    render(); if(focusModeActive)updateFocusDisplay(); return;
  }
  // DOM-only update — no full re-render needed every tick
  const f=fmtFlip(flipTimerRemain);
  const timeStr = flipTimerGoal>=3600 ? `${f.h}:${f.m}:${f.s}` : `${f.m}:${f.s}`;
  const mainTime = document.getElementById('main-timer-display');
  if(mainTime) mainTime.textContent = timeStr;
  const lbl = document.getElementById('flip-lbl');
  if(lbl) lbl.textContent = flipTimerRemain<3600 ? `${Math.ceil(flipTimerRemain/60)}m left` : `${Math.floor(flipTimerRemain/3600)}h ${Math.ceil((flipTimerRemain%3600)/60)}m`;
  if(focusModeActive) updateFocusDisplay();
}

function renderTimer() {
  const r = flipTimerRemain;
  const f = fmtFlip(r);
  const timeStr = flipTimerGoal>=3600 ? `${f.h}:${f.m}:${f.s}` : `${f.m}:${f.s}`;
  const week = [];
  for (let i=6;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const hrs=Math.round(studySessions.filter(s=>s.date===ds).reduce((a,s)=>a+s.duration,0)*10)/10;
    week.push({ds,hrs,day:d.toLocaleDateString('en-IN',{weekday:'short'})});
  }
  const maxH = Math.max(...week.map(d=>d.hrs),1);
  const todayH = todayHrs();
  const totalH = Math.round(studySessions.reduce((a,s)=>a+s.duration,0)*10)/10;

  // ── Setup screen ─────────────────────────────────────
  const setup = `<div style="text-align:center;padding:20px 0">
    <div style="font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px">Set Duration</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px">

      oninput="if(this.value)flipSetGoal(parseInt(this.value))"/>
    <input class="inp" placeholder="What are you studying?" value="${esc(flipTimerLabel)}"
      style="max-width:320px;text-align:center;margin:0 auto 20px;display:block"
      oninput="flipTimerLabel=this.value"/>
    <button class="btn b-blue" style="border-radius:30px;padding:12px 36px;font-size:14px" onclick="flipStart()">▶ Start Focus</button>
    ${flipTimerGoal?`<div style="font-size:11px;color:var(--text3);margin-top:10px">${Math.floor(flipTimerGoal/60)} minutes set</div>`:""}
  </div>`;

  // ── Running screen — large flat timer, no ring ────────
  const timerCol = r<=0?"#16a34a":flipTimerRunning?"#0891b2":"#d97706";
  const running = `<div style="text-align:center">
    <div style="font-size:11px;color:var(--text3);margin-bottom:16px;font-style:italic">${esc(flipTimerLabel||'Focus Session')}</div>

    <!-- BIG FLAT TIMER -->
    <div style="display:flex;justify-content:center;align-items:center;height:120px;margin-bottom:6px">
      <div id="main-timer-display" style="font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:800;letter-spacing:2px;color:${timerCol};line-height:1;transition:color .5s">${timeStr}</div>
    </div>
    <div id="flip-lbl" style="font-size:13px;color:var(--text3);margin-bottom:20px;min-height:20px">
      ${r<=0?"Done!":r<3600?Math.ceil(r/60)+"m left":Math.floor(r/3600)+"h "+Math.ceil((r%3600)/60)+"m"}
    </div>

    <!-- CONTROLS -->
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:8px">
      ${r<=0 ? `
        <button class="btn b-green" style="border-radius:30px;padding:10px 24px" onclick="flipSaveSession()">💾 Save Session</button>
        <button class="btn b-surface" style="border-radius:30px;padding:10px 20px" onclick="flipReset()">↺ New</button>
      ` : flipTimerRunning ? `
        <button class="btn b-amber" style="border-radius:30px;padding:10px 24px" onclick="flipPause()">⏸ Pause</button>
        <button class="btn b-ghost" style="border-radius:30px;padding:10px 20px" onclick="flipSaveSession()">💾 Save</button>
        <button class="btn b-ghost" style="border-radius:30px;padding:10px 20px" onclick="flipReset()">✕ Cancel</button>
        <button class="btn b-surface" style="border-radius:30px;padding:10px 20px;background:#1a1a2e;color:#a78bfa;border-color:rgba(167,139,250,0.3)" onclick="enterFocusMode()">⛶ Focus Mode</button>
      ` : `
        <button class="btn b-blue" style="border-radius:30px;padding:10px 24px" onclick="flipResume()">▶ Resume</button>
        <button class="btn b-green" style="border-radius:30px;padding:10px 20px" onclick="flipSaveSession()">💾 Save</button>
        <button class="btn b-ghost" style="border-radius:30px;padding:10px 20px" onclick="flipReset()">↺ Reset</button>
        <button class="btn b-surface" style="border-radius:30px;padding:10px 20px;background:#1a1a2e;color:#a78bfa;border-color:rgba(167,139,250,0.3)" onclick="enterFocusMode()">⛶ Focus Mode</button>
      `}
    </div>
  </div>`;

  // ── Weekly Hours chart ───────────────────────────────
  const weekChart = `<div class="card" style="margin-bottom:14px;margin-top:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div class="panel-label" style="margin-bottom:2px">📊 Weekly Hours</div>

        <div style="font-size:10px;color:var(--text3)">Today</div>
        <div class="mono" style="font-size:22px;color:${todayH>=6?"#16a34a":todayH>=3?"#d97706":"#dc2626"}">${todayH}h</div>
      </div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:80px">
      ${week.map(d => {
        const barH = Math.max(0, Math.round(d.hrs/maxH*100));
        const isT = d.ds===todayStr();
        const col = isT?"#2563eb":d.hrs>=6?"#16a34a":d.hrs>=3?"#d97706":"rgba(148,163,184,0.15)";
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">

          <div style="width:100%;flex:1;background:var(--surface2);border-radius:3px 3px 0 0;display:flex;align-items:flex-end;overflow:hidden">
            <div style="width:100%;height:${Math.max(barH,d.hrs>0?5:0)}%;background:${col};border-radius:3px 3px 0 0;transition:height .5s"></div>
          </div>
          <div style="font-size:9px;color:${isT?"#2563eb":"var(--text3)"};font-weight:${isT?700:400}">${d.day}</div>

      }).join("")}

  const todaySessions = studySessions.filter(s => s.date === todayStr());
  const log = `<div class="card">
    <div class="panel-label">Session Log — Today</div>
    ${todaySessions.length ? todaySessions.slice().reverse().map((s, i) => {
      const gi = studySessions.length - 1 - i;
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);margin-bottom:4px">
        <div style="width:3px;height:28px;border-radius:2px;background:${s.duration>=2?"#2563eb":"#d97706"};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.label)}</div>
          <div style="font-size:10px;color:var(--text3)">${s.duration}h</div>
        </div>
        <button onclick="deleteSession(${gi})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px">×</button>
      </div>`;
    }).join("") : `<div style="text-align:center;padding:20px;color:var(--text3)">No sessions yet today</div>`}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between">
      <span style="font-size:10px;color:var(--text3)">All-time total</span>
      <span class="mono" style="font-size:12px;font-weight:700">${totalH}h</span>
    </div>
  </div>`;

  return `
  <div style="font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:18px;color:var(--text)">⏱ Focus Timer</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start">
    <div style="background:var(--surface);border:1.5px solid var(--border2);border-radius:16px;padding:28px">
      <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:${flipTimerSetMode?20:0}px;text-align:center">
        ${flipTimerSetMode?"CONFIGURE":flipTimerRunning?"● RECORDING":"⏸ PAUSED"}
      </div>
      ${flipTimerSetMode ? setup : running}
    </div>
    <div>${weekChart}${log}</div>
  </div>`;
}

function renderPlanner() {
  if (pView === "active") return renderActivePlan();
  if (pView === "create") return renderWizard();
  return renderPlanList();
}
function renderPlanList() {
  const hdr = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
    <div style="font-family:'Sora',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.3px">📅 Study Planner</div>
    <button class="btn b-blue" onclick="initWiz()">+ New Plan</button>
  </div>`;
  if (!plans.length) return hdr + `<div class="card" style="text-align:center;padding:48px;border-style:dashed">
    <div style="font-size:40px;margin-bottom:10px">📅</div>
    <div style="font-size:16px;font-weight:600;margin-bottom:6px">No plans yet</div>
    <div style="color:var(--text3);font-size:13px;margin-bottom:16px">Create a daily revision plan</div>
    <button class="btn b-blue" onclick="initWiz()">Create First Plan</button>
  </div>`;
  const cards = plans.map(plan => {
    const tot = plan.days.reduce((a,d) => a+d.chapters.length, 0);
    const dn = plan.days.reduce((a,d) => a+d.chapters.filter(x=>x.done).length, 0);
    const pct = tot ? Math.round(dn/tot*100) : 0;
    const nm = plan.subjectKeys.map(k => D[k]?.short||k).join(" + ");
    const ed = new Date(plan.startDate); ed.setDate(ed.getDate()+plan.totalDays-1);
    const now = new Date(), st = new Date(plan.startDate);
    const td = Math.max(0, Math.min(plan.totalDays-1, Math.floor((now-st)/86400000)));
    return `<div class="card" style="cursor:pointer;margin-bottom:10px" onclick="openPlan('${plan.id}',${td})">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <div style="font-weight:700;font-size:15px;margin-bottom:3px">${esc(nm)} — Rev ${plan.revIndex+1}</div>
          <div style="font-size:11px;color:var(--text3)">${plan.totalDays} days · ${new Date(plan.startDate).toLocaleDateString("en-IN",{day:"numeric",month:"short"})} → ${ed.toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</div>
          <div class="bar-wrap" style="margin-top:10px;max-width:300px"><div class="bar-fill" style="width:${pct}%;background:#2563eb"></div></div>
          <div style="font-size:10px;color:var(--text3);margin-top:3px">${dn}/${tot} · ${pct}% done</div>
        </div>
        ${ringW(pct,"#2563eb",44,3)}
        <button class="btn b-blue btn-sm" style="font-size:11px" onclick="event.stopPropagation();editPlan('${plan.id}')">✏ Edit</button>
        <button class="btn btn-sm" style="background:transparent;color:#dc2626;border:1px solid rgba(255,61,61,0.2)" onclick="event.stopPropagation();showDelPlan('${plan.id}')">Delete</button>
      </div>
    </div>`;
  }).join("");
  return hdr + cards;
}

function renderActivePlan() {
  const plan = plans.find(p => p.id === activePlanId);
  if (!plan) { pView = "list"; return renderPlanList(); }
  const tot = plan.days.reduce((a,d) => a+d.chapters.length, 0);
  const dn = plan.days.reduce((a,d) => a+d.chapters.filter(x=>x.done).length, 0);
  const pct = tot ? Math.round(dn/tot*100) : 0;
  const nm = plan.subjectKeys.map(k => D[k]?.short||k).join(" + ");
  const catCols = {A:"#dc2626",B:"#d97706",C:"var(--text3)"};
  const revCols = ["#2563eb","#0891b2","#16a34a","#d97706"];

  const carry = [];
  for (let d=0;d<activeDay;d++) {
    (plan.days[d]?.chapters||[]).forEach((ch,ci) => {
      if(!ch.done) carry.push({...ch,_fd:d,_di:d,_ci:ci});

  const day = plan.days[activeDay] || {chapters:[]};

      <div class="chkbox ${ch.done?"done":""}">${ch.done?chkSvg():""}</div>

        <span style="font-size:10px;color:var(--text3)">${skChs.filter(x=>x.done).length}/${skChs.length}</span>
      </div>

        const cd = D[sk]?.chapters.find(x=>x.id===ch.id);

        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="togglePCh('${plan.id}',${activeDay},${ch._i})">

}

function carryover2(plan, dayIdx) {
  if (!dayIdx) return [];
  const r = [];
  for (let d=0;d<dayIdx;d++) (plan.days[d]?.chapters||[]).forEach((ch,ci) => { if(!ch.done) r.push({...ch,_fd:d,_di:d,_ci:ci}); });
  return r;
}

            <button onclick="if(wDays>1){wDays--;render()}" style="width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;cursor:pointer">−</button>
            <div class="mono" style="font-size:32px;font-weight:700;min-width:44px;text-align:center">${wDays}</div>

          </div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">Ends: ${fmtDate(wStart,wDays-1)}</div>
        </div>
        <div style="flex:1;min-width:160px">
          <div style="font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Start Date</div>

      <div style="display:flex;gap:8px"><button class="btn b-ghost" onclick="wStep=1;render()">← Back</button><button class="btn b-blue" onclick="goStep3()">Next →</button></div>

  // Step 3
  const allC2 = wSubs.flatMap(sk => (D[sk]?.chapters||[]).map((c,i) => ({...c,_sub:sk,_done:c.revisions[wRev]?.done})));

  return hdr+`<div class="card card-sm" style="margin-bottom:10px">

}
