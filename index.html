<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#2563eb"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="CA Tracker"/>
  <meta name="mobile-web-app-capable" content="yes"/>

  <!-- Android WebView: prevent cache issues -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>

  <title>CA Final — Performance Tracker</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json"/>

  <!-- Favicon fallback (inline SVG as data URI) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📚</text></svg>"/>

  <!-- Fonts — preconnect for speed, loaded async -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'"/>
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  </noscript>

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css"/>

  <!-- XLSX library for export — loaded before app scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- Main app mount point -->
  <div id="app"></div>

  <!-- Sidebar overlay for mobile tap-to-close -->
  <div id="sidebar-overlay" onclick="closeSidebarOverlay()"></div>

  <!-- Full-screen focus mode overlay -->
  <div id="focus-overlay" onclick="">
    <div class="focus-label" id="focus-label-text">Focus Session</div>
    <div id="focus-time">25:00</div>
    <div id="focus-status"></div>
    <div class="focus-btns">
      <button class="focus-btn" id="focus-pause-btn" onclick="focusPauseResume()">⏸ Pause</button>
      <button class="focus-btn save" onclick="exitFocusMode();flipSaveSession()">💾 Save</button>
      <button class="focus-btn exit" onclick="exitFocusMode()">✕ Exit Focus</button>
    </div>
  </div>

  <!-- ── JavaScript Modules (order matters — globals must be defined first) ── -->
  <script src="js/constants.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/risk-engine.js"></script>
  <script src="js/metrics.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/ui-dash.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/planner.js"></script>
  <script src="js/tests.js"></script>
  <script src="js/diary.js"></script>
  <script src="js/strategy.js"></script>
  <script src="js/app.js"></script>

  <!-- ── PWA: Service Worker Registration ─────────────────────── -->
  <script>
    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[PWA] SW registered:', reg.scope))
          .catch(err => console.warn('[PWA] SW registration failed:', err));
      });
    }

    // Mobile: close sidebar when tapping overlay
    function closeSidebarOverlay() {
      sidebarOpen = false;
      const overlay = document.getElementById('sidebar-overlay');
      if (overlay) overlay.classList.remove('visible');
      render();
    }

    // PWA Install prompt — capture and expose for optional in-app install button
    window._pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window._pwaInstallPrompt = e;
    });

    // Android WebView: intercept navigation to prevent leaving the app
    document.addEventListener('click', e => {
      const a = e.target.closest('a[href]');
      if (a && a.href && !a.href.startsWith('javascript:')) {
        const url = new URL(a.href, location.href);
        // Allow same-origin navigation; open external links in new tab
        if (url.origin !== location.origin && url.protocol.startsWith('http')) {
          e.preventDefault();
          try { window.open(a.href, '_blank', 'noopener'); } catch(x) {}
        }
      }
    });
  </script>

</body>
</html>
